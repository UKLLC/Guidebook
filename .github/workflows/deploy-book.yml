name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10.19

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build the book
        working-directory: ukllc_book
        env:
          FASTAPI_KEY: ${{ secrets.FASTAPI_KEY }}
          DATACITE_PROD_PW: ${{ secrets.DATACITE_PROD_PW }}
        run: |
          jupyter-book build .

      - name: Upload built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ukllc_book/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4